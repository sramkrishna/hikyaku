<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Wide gravestone with arched top — lighter opacity for stone body -->
  <path d="M 3 14 L 3 6 Q 3 2 8 2 Q 13 2 13 6 L 13 14 Z"
        fill="#bebebe" fill-opacity="0.4"/>
  <!-- RIP text — full opacity so it stands out against the lighter stone -->
  <text x="8" y="9.5" text-anchor="middle"
        font-family="sans-serif" font-size="5" font-weight="bold"
        fill="#bebebe" fill-opacity="1.0">RIP</text>
  <!-- Ground mound -->
  <ellipse cx="8" cy="14.5" rx="6.5" ry="1.2" fill="#bebebe" fill-opacity="0.3"/>
</svg>
