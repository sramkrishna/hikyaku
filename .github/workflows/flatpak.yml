name: Flatpak

# PR-only CI build: validates that the flatpak still builds on every pull request.
# Push-to-main builds are handled by flatpak-publish.yml, which also exports
# the OSTree repo to GitHub Pages and uploads release artifacts.

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: hikyaku.flatpak
          manifest-path: flatpak/me.ramkrishna.hikyaku.json
          cache-key: flatpak-builder-${{ github.sha }}
