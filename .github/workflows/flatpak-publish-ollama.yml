name: Publish Ollama Extension

# Builds the me.ramkrishna.hikyaku.Ollama flatpak extension and attaches it
# as a release asset to the current Hikyaku GitHub release.
#
# The Ollama bundle is ~2 GB — too large for the OSTree/gh-pages repo.
# GitHub Releases supports assets up to 2 GB, so the bundle lives there.
#
# Run this manually whenever you want to update the bundled Ollama version.
#
# Install (after hikyaku itself is already installed):
#   flatpak install --user hikyaku-ollama.flatpak

on:
  workflow_dispatch:
    inputs:
      flatpak_branch:
        description: "Flatpak branch to build (stable or beta)"
        required: true
        default: stable
        type: choice
        options: [stable, beta]
      release_tag:
        description: "GitHub release tag to attach the bundle to (e.g. v0.1.1)"
        required: true
        default: ""

concurrency:
  group: flatpak-publish-ollama
  cancel-in-progress: false

jobs:
  publish-ollama:
    name: Build and publish Ollama extension
    runs-on: ubuntu-latest
    environment: FLATPAK_GPG_KEY
    permissions:
      contents: write

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.FLATPAK_GPG_KEY }}" | base64 -d | gpg --batch --import

      # The extension manifest uses me.ramkrishna.hikyaku as its runtime.
      # Pre-install it to the system installation (the action uses --system)
      # with --no-gpg-verify so flatpak-builder can find the extension point.
      - name: Install Hikyaku as extension runtime
        run: |
          flatpak remote-add --system --no-gpg-verify hikyaku https://hikyaku.ramkrishna.me
          flatpak install --system -y --no-auto-pin hikyaku me.ramkrishna.hikyaku//stable

      - name: Cache Ollama source download
        uses: actions/cache@v4
        with:
          path: ~/.cache/flatpak-builder
          key: ollama-src-v0.20.5

      - name: Build Ollama extension
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: hikyaku-ollama.flatpak
          manifest-path: flatpak/me.ramkrishna.hikyaku.Ollama.json
          cache-key: flatpak-ollama-build-v0.20.5
          branch: ${{ github.event.inputs.flatpak_branch }}

      # Attach the bundle to an existing GitHub release as a release asset.
      # The release must already exist (created by the main publish workflow).
      - name: Upload bundle to GitHub Release
        run: |
          gh release upload "${{ github.event.inputs.release_tag }}" \
            hikyaku-ollama.flatpak \
            --clobber \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
