name: Publish Flatpak Repo

# Builds the flatpak and publishes to the OSTree repo on GitHub Pages.
#
# Two branches are maintained in the same repo at hikyaku.ramkrishna.me:
#   stable  — built from version tags (v*)
#   beta    — built from every push to main
#
# Install:
#   flatpak install --user hikyaku.flatpakref        # stable
#   flatpak install --user hikyaku-beta.flatpakref   # beta

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      flatpak_branch:
        description: "Flatpak branch to build (stable or beta)"
        required: true
        default: beta
        type: choice
        options: [stable, beta]

# Only one publish job runs at a time. A new push queues behind the current
# run rather than racing to write gh-pages simultaneously.
concurrency:
  group: flatpak-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.FLATPAK_GPG_KEY }}" | base64 -d | gpg --batch --import

      # Determine which OSTree branch this build targets.
      - name: Determine flatpak branch
        id: meta
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            branch="${{ github.event.inputs.flatpak_branch }}"
          elif [[ "$GITHUB_REF" == refs/tags/v*-* ]]; then
            branch=beta
          else
            branch=stable
          fi
          echo "flatpak_branch=$branch" >> $GITHUB_OUTPUT
          [[ "$branch" == "stable" ]] && echo "is_release=true" >> $GITHUB_OUTPUT || echo "is_release=false" >> $GITHUB_OUTPUT

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: hikyaku.flatpak
          manifest-path: flatpak/me.ramkrishna.hikyaku.json
          cache-key: flatpak-builder-${{ github.sha }}
          branch: ${{ steps.meta.outputs.flatpak_branch }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikyaku-${{ steps.meta.outputs.flatpak_branch }}-${{ github.sha }}
          path: hikyaku.flatpak
          retention-days: 14

      - name: Create GitHub Release
        if: steps.meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: hikyaku.flatpak
          generate_release_notes: true

      # Fetch the existing gh-pages OSTree repo so we accumulate both
      # stable and beta refs rather than overwriting one with the other.
      - name: Restore existing OSTree repo from gh-pages
        run: |
          mkdir -p repo
          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse origin/gh-pages >/dev/null 2>&1; then
            git archive origin/gh-pages | tar -x -C repo/
          fi

      - name: Import bundle into OSTree repo
        run: |
          GPG_KEY=24E5A1F70B12F13615C663B617D97C8A0E887802
          flatpak build-import-bundle --update-appstream --gpg-sign="$GPG_KEY" repo/ hikyaku.flatpak
          flatpak build-update-repo --gpg-sign="$GPG_KEY" --generate-static-deltas repo/

      # Re-write the CNAME (git archive may have extracted an old one; this ensures
      # it is always correct after force_orphan wipes gh-pages history).
      - name: Write CNAME
        run: echo "hikyaku.ramkrishna.me" > repo/CNAME

      # force_orphan keeps gh-pages history lean; accumulated content is already
      # in repo/ from the restore step above, so nothing is lost.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          force_orphan: true
