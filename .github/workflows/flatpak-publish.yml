name: Publish Flatpak Repo

# Builds the flatpak and publishes to the OSTree repo on GitHub Pages.
#
# Two branches are maintained in the same repo at hikyaku.ramkrishna.me:
#   stable  — built from version tags (v*)
#   beta    — built from every push to main
#
# Install:
#   flatpak install --user hikyaku.flatpakref        # stable
#   flatpak install --user hikyaku-beta.flatpakref   # beta

on:
  push:
    tags: ["v*"]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      flatpak_branch:
        description: "Flatpak branch to build (stable or beta)"
        required: true
        default: beta
        type: choice
        options: [stable, beta]

# Only one publish job runs at a time *per ref*. Grouping globally would
# let a fresh push to main cancel a queued tag run (and vice versa) with
# the message "Canceling since a higher priority waiting request for
# flatpak-publish exists" — GitHub keeps at most one waiting entry per
# group. Since stable (tags) and beta (main) produce different OSTree
# branches, they must never cancel each other. Pushing several times to
# main in rapid succession will still supersede older queued beta builds,
# which is the desired behaviour for that branch alone.
concurrency:
  group: flatpak-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: FLATPAK_GPG_KEY
    permissions:
      contents: write

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.FLATPAK_GPG_KEY }}" | base64 -d | gpg --batch --import

      # Determine which OSTree branch this build targets.
      - name: Determine flatpak branch
        id: meta
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            branch="${{ github.event.inputs.flatpak_branch }}"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            branch=beta
          elif [[ "$GITHUB_REF" == refs/tags/v*-* ]]; then
            branch=beta
          else
            branch=stable
          fi
          echo "flatpak_branch=$branch" >> $GITHUB_OUTPUT
          [[ "$branch" == "stable" ]] && echo "is_release=true" >> $GITHUB_OUTPUT || echo "is_release=false" >> $GITHUB_OUTPUT
          [[ "$branch" == "beta" ]] && echo "manifest=flatpak/me.ramkrishna.hikyaku.Devel.json" >> $GITHUB_OUTPUT || echo "manifest=flatpak/me.ramkrishna.hikyaku.json" >> $GITHUB_OUTPUT

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: hikyaku.flatpak
          manifest-path: ${{ steps.meta.outputs.manifest }}
          cache-key: flatpak-builder-${{ github.sha }}
          branch: ${{ steps.meta.outputs.flatpak_branch }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikyaku-${{ steps.meta.outputs.flatpak_branch }}-${{ github.sha }}
          path: hikyaku.flatpak
          retention-days: 14

      - name: Create GitHub Release
        if: steps.meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: hikyaku.flatpak
          generate_release_notes: true

      # Fetch the existing gh-pages OSTree repo so we accumulate both
      # stable and beta refs rather than overwriting one with the other.
      #
      # The deploy step uses force_orphan: true, which replaces gh-pages
      # history with whatever is in repo/. If this restore silently fails
      # when gh-pages already exists remotely, the orphan push wipes the
      # other branch's ref — that's how "app/me.ramkrishna.hikyaku/x86_64/stable"
      # disappeared from the remote. So: distinguish "first run, no gh-pages
      # yet" (empty repo is OK) from "fetch failed" (must abort to avoid
      # destroying live refs).
      - name: Restore existing OSTree repo from gh-pages
        run: |
          set -euo pipefail
          mkdir -p repo
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages exists remotely — restoring to preserve existing refs"
            git fetch --depth=1 origin gh-pages
            git archive origin/gh-pages | tar -x -C repo/
            if [ -z "$(ls -A repo/)" ]; then
              echo "FATAL: gh-pages exists but restore produced empty repo/"
              echo "Aborting so force_orphan push cannot wipe live refs."
              exit 1
            fi
          else
            echo "gh-pages does not exist remotely — first run, starting empty"
          fi

      - name: Import bundle into OSTree repo
        run: |
          GPG_KEY=24E5A1F70B12F13615C663B617D97C8A0E887802
          GNUPGHOME="$HOME/.gnupg"
          # Drop any unsigned appstream refs left from pre-GPG builds so
          # build-update-repo creates fresh signed ones.
          ostree refs --delete appstream/x86_64  --repo repo/ 2>/dev/null || true
          ostree refs --delete appstream2/x86_64 --repo repo/ 2>/dev/null || true
          flatpak build-import-bundle --update-appstream \
            --gpg-sign="$GPG_KEY" --gpg-homedir="$GNUPGHOME" \
            repo/ hikyaku.flatpak
          flatpak build-update-repo \
            --gpg-sign="$GPG_KEY" --gpg-homedir="$GNUPGHOME" \
            --generate-static-deltas repo/

      # Re-write the CNAME (git archive may have extracted an old one; this ensures
      # it is always correct after force_orphan wipes gh-pages history).
      - name: Write CNAME
        run: echo "hikyaku.ramkrishna.me" > repo/CNAME

      # force_orphan keeps gh-pages history lean; accumulated content is already
      # in repo/ from the restore step above, so nothing is lost.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          force_orphan: true
